<!DOCTYPE html>
<html>
<head>
<title>Simple Cute Calculator</title>
<style>
body{
    background:linear-gradient(to right,#ffc0cb,#add8e6);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}
.calculator{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px gray;
}
#screen{
    width:100%;
    height:50px;
    font-size:22px;
    text-align:right;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
    padding:5px;
}
button{
    width:60px;
    height:50px;
    font-size:18px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#ffe4e1;
    cursor:pointer;
}
button:hover{
    background:#ffd1dc;
}
.operator{
    background:#d0e8ff;
}
.equal{
    background:#b2f2bb;
}
.clear{
    background:#ffb3b3;
}
</style>
</head>
<body>
<div class="calculator">
<input type="text" id="screen" readonly>
<br>
<button onclick="clearScreen()" class="clear">C</button>
<button onclick="del()">⌫</button>
<button onclick="press('/')" class="operator">÷</button>
<button onclick="press('*')" class="operator">×</button>
<br>
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('-')" class="operator">−</button>
<br>
<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('+')" class="operator">+</button>
<br>
<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="calculate()" class="equal">=</button>
<br>
<button onclick="press('0')" style="width:135px;">0</button>
<button onclick="press('.')">.</button>
</div>
<script>
function press(value){
document.getElementById("screen").value += value;
}
function clearScreen(){
document.getElementById("screen").value = "";
}
function del(){
let text = document.getElementById("screen");
text.value = text.value.slice(0,-1);
}
function calculate(){
let result = document.getElementById("screen").value;
document.getElementById("screen").value = eval(result);
}
</script>
</body>
</html>
